<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de usuarios</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="admin-page">
    <header>
      <h1>Gestión de usuarios</h1>
      <p>Revisa los usuarios registrados y elimina cuentas no deseadas.</p>
      <div class="actions">
        <a class="button secondary" href="/admin">Volver al panel</a>
        <a class="button" href="/admin/register">Crear usuario</a>
        <a class="button secondary" href="/admin/logout">Cerrar sesión</a>
      </div>
    </header>

    <main>
      <div id="user-message" class="empty" hidden></div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Usuario</th>
            <th>Rol</th>
            <th>Creado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="user-rows"></tbody>
      </table>
    </main>

    <script src="/admin_users.js"></script>
  </body>
</html>
