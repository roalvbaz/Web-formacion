<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear usuario administrador</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="login-page">
    <article class="login-card">
      <div class="brand">
        <div class="brand-mark">+</div>
        <div class="brand-title">
          <h1>Nuevo usuario</h1>
          <p>Agrega un nuevo usuario con rol de administrador o usuario normal.</p>
        </div>
      </div>

      <form action="/admin/register" method="post">
        <label for="username">
          Usuario
          <input id="username" name="username" type="text" placeholder="nuevo-admin" required />
        </label>

        <label for="password">
          Contraseña
          <input id="password" name="password" type="password" placeholder="Contraseña segura" required />
        </label>

        <label for="password_confirm">
          Repite contraseña
          <input id="password_confirm" name="password_confirm" type="password" placeholder="Repite la contraseña" required />
        </label>

        <label for="role">
          Rol
          <select id="role" name="role">
            <option value="admin">Administrador</option>
            <option value="user" selected>Usuario normal</option>
          </select>
        </label>

        <button type="submit">Crear usuario</button>
      </form>

      <div id="status-message" class="error" hidden></div>

      <div class="login-footer">
        <a href="/admin">Volver al panel</a>
        <a href="/admin/logout">Cerrar sesión</a>
      </div>
    </article>

    <script>
      const params = new URLSearchParams(window.location.search);
      const status = document.getElementById('status-message');
      if (params.get('error')) {
        status.hidden = false;
        status.textContent = decodeURIComponent(params.get('error'));
      }
      if (params.get('success')) {
        status.hidden = false;
        status.className = 'success';
        status.textContent = 'Usuario creado correctamente.';
      }
    </script>
  </body>
</html>
